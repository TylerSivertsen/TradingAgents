services:
  trader:
    build: .
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./data:/app/data
      - ./audit:/app/audit
      - ./experiments:/app/experiments
    command: ["diagnostics"]
    stdin_open: true
    tty: true

  trader-tui:
    build: .
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./data:/app/data
      - ./audit:/app/audit
      - ./experiments:/app/experiments
    command: ["tui"]
    stdin_open: true
    tty: true

  trader-shadow:
    build: .
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./data:/app/data
      - ./audit:/app/audit
      - ./experiments:/app/experiments
    command: ["quant-run", "--shadow"]
    stdin_open: true
    tty: true

  tests:
    build: .
    env_file:
      - .env.example
    volumes:
      - .:/app
    command: ["test"]
